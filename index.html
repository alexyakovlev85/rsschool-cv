<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV</title>
    <link rel="icon" href="assets/svg/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="header__inner">
          <nav class="nav">
            <ul class="nav__list">
              <li class="nav__item">
                <a class="nav__link" href="#about">About me</a>
              </li>
              <li class="nav__item">
                <a class="nav__link" href="#contacts">Contacts</a>
              </li>
              <li class="nav__item">
                <a class="nav__link" href="#courses">Courses</a>
              </li>
              <li class="nav__item">
                <a class="nav__link" href="#skills">Skills</a>
              </li>
              <li class="nav__item">
                <a class="nav__link" href="#code">Code examples</a>
              </li>
              <li class="nav__item">
                <a class="nav__link" href="#projects">Projects</a>
              </li>
              <li class="nav__item">
                <a class="nav__link" href="#languages">Languages</a>
              </li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="main">
        <div class="main__inner">
          <div class="main__section main__section--left">
            <section class="profile">
              <div class="profile__inner">
                <img
                  class="profile__img"
                  src="assets/img/myphoto.jpg"
                  alt="It's me"
                  width="300"
                />
                <div class="profile__info">
                  <h1 class="profile__title">
                    <span class="profile__name">Alexander</span>
                    <span class="profile__surname">Yakovlev</span>
                  </h1>
                  <p class="profile__text">Junior Front-end Developer</p>
                </div>
              </div>
            </section>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
